[theme]
primaryColor = "#667eea"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#1f2937"
font = "sans serif"

[server]
port = 8501
headless = true
enableCORS = false
maxUploadSize = 200
# Disable hot-reload watcher: production doesn't need it, and BERTopic
# pulls in transformers, whose ~hundreds of image_processing_*_fast
# submodules each try to import torchvision (not installed on Cloud) when
# the watcher introspects them — generating massive log noise.
fileWatcherType = "none"

[browser]
gatherUsageStats = false
serverAddress = "localhost"
